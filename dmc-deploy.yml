---
# yamllint disable rule:line-length
variables:
  REGISTRY_ENDPOINT: rg.pl-waw.scw.cloud/dynamic-env-prod
  SCW_OIDC_ENDPOINT: https://oidc.dmc.miquido.dev
  RUN_COMPOSE_URL: https://docker.dmc.miquido.dev/run-compose
  SERVICE_IMAGE: $REGISTRY_ENDPOINT/$VIRTUAL_HOST_BASE
  SERVICE_TAG: $CI_PIPELINE_ID-$CI_COMMIT_SHORT_SHA
  COMPOSE_VARS: "SERVICE_IMAGE SERVICE_TAG DEPLOY_DATE"

.scw-run-compose:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.miquido.com
  variables:
    RUN_COMPOSE_URL: https://docker.dmc.miquido.dev/run-compose
  before_script:
    - apk add curl apache2-utils
    - curl -sL https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -o /usr/local/bin/yq && chmod +x /usr/local/bin/yq
    - |
      MISSING=""
      for var in VIRTUAL_HOST_BASE SERVICE_PORT VIRTUAL_HOST ROUTER_NAME; do
        eval "val=\$$var"
        [ -z "$val" ] && MISSING="$MISSING\n  - $var"
      done
      if [ -n "$MISSING" ]; then
        printf "ERROR: Missing required variables:%b\n" "$MISSING" >&2
        exit 1
      fi
    - export DEPLOY_DATE=$(date -u '+%Y-%m-%dT%H:%MZ')
    - |
      PUBLIC_FACING_DOCKER_SERVICE_NAME="${PUBLIC_FACING_DOCKER_SERVICE_NAME:-$(yq eval '.services | keys | .[0]' docker-compose.yml)}"
      printf 'services:\n  %s:\n    labels:\n' "$PUBLIC_FACING_DOCKER_SERVICE_NAME" > /tmp/traefik-overlay.yml
      printf '      - "traefik.enable=true"\n' >> /tmp/traefik-overlay.yml
      printf '      - "traefik.http.routers.%s.rule=Host(`%s`)"\n' "$ROUTER_NAME" "$VIRTUAL_HOST" >> /tmp/traefik-overlay.yml
      printf '      - "traefik.http.routers.%s.tls.certresolver=letsencrypt"\n' "$ROUTER_NAME" >> /tmp/traefik-overlay.yml
      printf '      - "traefik.http.routers.%s.tls.domains[0].main=dmc.miquido.dev"\n' "$ROUTER_NAME" >> /tmp/traefik-overlay.yml
      printf '      - "traefik.http.routers.%s.tls.domains[0].sans=*.dmc.miquido.dev"\n' "$ROUTER_NAME" >> /tmp/traefik-overlay.yml
      printf '      - "traefik.http.services.%s.loadbalancer.server.port=%s"\n' "$ROUTER_NAME" "$SERVICE_PORT" >> /tmp/traefik-overlay.yml
      if [ -n "$SECURE_USER" ] && [ -n "$SECURE_PASS" ]; then
        AUTH_USERS=$(htpasswd -nbB "$SECURE_USER" "$SECURE_PASS")
        printf '      - "traefik.http.middlewares.%s-auth.basicauth.users=%s"\n' "$ROUTER_NAME" "$AUTH_USERS" >> /tmp/traefik-overlay.yml
        printf '      - "traefik.http.routers.%s.middlewares=%s-auth"\n' "$ROUTER_NAME" "$ROUTER_NAME" >> /tmp/traefik-overlay.yml
      fi
      printf '    networks:\n      - traefik-net\n      - default\n' >> /tmp/traefik-overlay.yml
      printf 'networks:\n  traefik-net:\n    external: true\n' >> /tmp/traefik-overlay.yml
      yq eval-all '. as $item ireduce ({}; . * $item)' docker-compose.yml /tmp/traefik-overlay.yml > /tmp/deploy-compose.yml
  script:
    - |
      FORM_ARGS="-F file=@/tmp/deploy-compose.yml"
      for var in $COMPOSE_VARS; do
        eval "val=\$$var"
        FORM_ARGS="$FORM_ARGS -F ${var}=${val}"
      done
      HTTP_STATUS=$(eval "curl -o /tmp/curl_response -w \"%{http_code}\" $FORM_ARGS -H \"Authorization: Bearer ${GITLAB_OIDC_TOKEN}\" ${RUN_COMPOSE_URL} -v")
      cat /tmp/curl_response
      if [ "${HTTP_STATUS%%00}" != "2" ]; then
        echo "ERROR: run-compose failed with HTTP status: $HTTP_STATUS" >&2
        exit 1
      fi
  tags:
    - docker
    - miquido

.scw-stop-compose:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.miquido.com
  variables:
    GIT_STRATEGY: none
    RUN_COMPOSE_URL: https://docker.dmc.miquido.dev/run-compose
  before_script:
    - apk add curl
  script:
    - |
      HTTP_STATUS=$(curl -o /tmp/curl_response -w "%{http_code}" -X DELETE \
        -H "Authorization: Bearer ${GITLAB_OIDC_TOKEN}" \
        ${RUN_COMPOSE_URL} -v)
      cat /tmp/curl_response
      if [ "${HTTP_STATUS%%00}" != "2" ]; then
        echo "ERROR: stop failed with HTTP status: $HTTP_STATUS" >&2
        exit 1
      fi
  tags:
    - docker
    - miquido

build:
  extends: .build-multiarch
  stage: build
  variables:
    PLATFORMS: linux/amd64
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

push:
  extends: .gitlab-push
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: dynamic-envs
  variables:
    DOCKER_IMAGE_DESTINATION: $SERVICE_IMAGE:$SERVICE_TAG
  script:
    - !reference [.scaleway-docker-login]
    - !reference [.gitlab-push, script]
  needs: [build]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

deploy:
  extends: .scw-run-compose
  needs: [push]
  variables:
    VIRTUAL_HOST: ${VIRTUAL_HOST_BASE}.dmc.miquido.dev
    ROUTER_NAME: $VIRTUAL_HOST_BASE
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment:
    name: $VIRTUAL_HOST_BASE
    url: https://${VIRTUAL_HOST_BASE}.dmc.miquido.dev
    on_stop: stop
    auto_stop_in: 7 days

deploy-mr:
  extends: .scw-run-compose
  needs: [push]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        VIRTUAL_HOST: ${VIRTUAL_HOST_BASE}-${CI_MERGE_REQUEST_IID}.dmc.miquido.dev
        ROUTER_NAME: ${VIRTUAL_HOST_BASE}-${CI_MERGE_REQUEST_IID}
  environment:
    name: ${VIRTUAL_HOST_BASE}-${CI_MERGE_REQUEST_IID}
    url: https://${VIRTUAL_HOST_BASE}-${CI_MERGE_REQUEST_IID}.dmc.miquido.dev
    on_stop: stop-mr
    auto_stop_in: 1 day

stop:
  extends: .scw-stop-compose
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
  environment:
    name: $VIRTUAL_HOST_BASE
    action: stop

stop-mr:
  extends: .scw-stop-compose
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
  environment:
    name: ${VIRTUAL_HOST_BASE}-${CI_MERGE_REQUEST_IID}
    action: stop
