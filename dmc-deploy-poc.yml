---
# Standalone template for single-service DMC deployments.
# Include this as the ONLY template — it pulls in docker-toolkit, scw-toolkit,
# and compose-toolkit internally. Do NOT mix with other deploy templates.
#
# Required project variables:
#   VIRTUAL_HOST_BASE  - subdomain base, e.g. "my-app" → my-app.dmc.miquido.dev
#   SERVICE_PORT       - container listen port, e.g. "80" or "3000"
# Optional:
#   DOCKERFILE_PATH                   - path to directory with Dockerfile (default: ".")
#   PUBLIC_FACING_DOCKER_SERVICE_NAME - service name in docker-compose.yml (default: first)
#   SECURE_USER / SECURE_PASS         - basic auth (default: no auth)

include:
  - remote: 'https://raw.githubusercontent.com/miquido/gitlab-templates/1.3.122/docker-toolkit.yml'
  - remote: 'https://raw.githubusercontent.com/miquido/gitlab-templates/1.3.122/scw-toolkit.yml'
  - remote: 'https://raw.githubusercontent.com/miquido/gitlab-templates/1.3.122/compose-toolkit.yml'

variables:
  REGISTRY_ENDPOINT: rg.pl-waw.scw.cloud/dynamic-env-prod
  SCW_OIDC_ENDPOINT: https://oidc.dmc.miquido.dev
  RUN_COMPOSE_URL: https://docker.dmc.miquido.dev/run-compose
  SERVICE_IMAGE: $REGISTRY_ENDPOINT/$VIRTUAL_HOST_BASE

build:
  extends: .build-multiarch
  stage: build
  variables:
    PLATFORMS: linux/amd64
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

push:
  extends: .gitlab-push
  stage: test
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: dynamic-envs
  variables:
    DOCKER_IMAGE_DESTINATION: $SERVICE_IMAGE:$SERVICE_TAG
  script:
    - !reference [.scaleway-docker-login]
    - !reference [.gitlab-push, script]
  needs: [build]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

push-mr:
  extends: .gitlab-push
  stage: test
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: dynamic-envs
  variables:
    DOCKER_IMAGE_DESTINATION: $SERVICE_IMAGE-mr:$SERVICE_TAG
  script:
    - !reference [.scaleway-docker-login]
    - !reference [.gitlab-push, script]
  needs: [build]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

deploy:
  extends: .deploy-compose
  stage: deploy
  needs: [push]
  variables:
    VIRTUAL_HOST: ${VIRTUAL_HOST_BASE}.dmc.miquido.dev
    ROUTER_NAME: $VIRTUAL_HOST_BASE
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment:
    name: $VIRTUAL_HOST_BASE
    url: https://${VIRTUAL_HOST_BASE}.dmc.miquido.dev
    on_stop: stop
    auto_stop_in: 7 days

deploy-mr:
  extends: .deploy-compose
  stage: deploy
  needs: [push-mr]
  variables:
    SERVICE_IMAGE: $REGISTRY_ENDPOINT/$VIRTUAL_HOST_BASE-mr
    VIRTUAL_HOST: ${VIRTUAL_HOST_BASE}-${CI_MERGE_REQUEST_IID}.dmc.miquido.dev
    ROUTER_NAME: ${VIRTUAL_HOST_BASE}-${CI_MERGE_REQUEST_IID}
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  environment:
    name: ${VIRTUAL_HOST_BASE}-${CI_MERGE_REQUEST_IID}
    url: https://${VIRTUAL_HOST_BASE}-${CI_MERGE_REQUEST_IID}.dmc.miquido.dev
    on_stop: stop-mr
    auto_stop_in: 1 day

stop:
  extends: .stop-compose
  variables:
    RUN_COMPOSE_URL: https://docker.dmc.miquido.dev/run-compose
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
  environment:
    name: $VIRTUAL_HOST_BASE
    action: stop

stop-mr:
  extends: .stop-compose
  variables:
    RUN_COMPOSE_URL: https://docker.dmc.miquido.dev/run-compose
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
  environment:
    name: ${VIRTUAL_HOST_BASE}-${CI_MERGE_REQUEST_IID}
    action: stop
